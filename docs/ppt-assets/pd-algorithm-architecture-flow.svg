<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#F7F6F2"/><text x="80" y="110" fill="#111827" font-size="48" font-family="Arial">老板语言翻译器算法架构</text><text x="80" y="156" fill="#4B5563" font-size="24" font-family="Arial">输入层 -> OCR 层 -> 潜台词分析 -> 三轨回复引擎 -> 高级包</text><rect x="80" y="220" width="190" height="110" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/><text x="122" y="278" fill="#1F2937" font-size="28" font-family="Arial">聊天截图</text><text x="124" y="312" fill="#6B7280" font-size="20" font-family="Arial">或粘贴文本</text><rect x="330" y="220" width="210" height="110" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/><text x="402" y="278" fill="#1F2937" font-size="28" font-family="Arial">PaddleOCR</text><text x="385" y="312" fill="#6B7280" font-size="20" font-family="Arial">截图转结构化文本</text><rect x="600" y="220" width="220" height="110" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/><text x="642" y="278" fill="#1F2937" font-size="28" font-family="Arial">潜台词解码</text><text x="638" y="312" fill="#6B7280" font-size="20" font-family="Arial">识别诉求/压力/边界</text><rect x="880" y="220" width="220" height="110" rx="24" fill="#FFFFFF" stroke="#D1D5DB"/><text x="940" y="278" fill="#1F2937" font-size="28" font-family="Arial">三轨回复</text><text x="914" y="312" fill="#6B7280" font-size="20" font-family="Arial">顺从/对齐/拒绝</text><line x1="270" y1="275" x2="330" y2="275" stroke="#2563EB" stroke-width="4"/><line x1="540" y1="275" x2="600" y2="275" stroke="#2563EB" stroke-width="4"/><line x1="820" y1="275" x2="880" y2="275" stroke="#2563EB" stroke-width="4"/><rect x="220" y="430" width="820" height="170" rx="28" fill="#FFFFFF" stroke="#D1D5DB"/><text x="260" y="490" fill="#111827" font-size="32" font-family="Arial">高级包增益</text><text x="260" y="540" fill="#374151" font-size="24" font-family="Arial">1. 下一步怎么接  2. 哪些话别说  3. 升级建议</text><text x="260" y="582" fill="#6B7280" font-size="22" font-family="Arial">通过激励视频解锁，免费结果与付费结果拆成两次调用</text></svg>
